<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortest Path & Node Map</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- Vis-Network for Graph Visualization -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        html {
            transition: background-color 0.4s ease;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Light Theme Backgrounds (Warm "Paper" Eye-Care Vibe) */
        html:not(.dark) body {
            background-color: #faf9f6; 
            background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #f0eee9 80%);
            color: #27272a;
        }

        /* Dark Theme Backgrounds (Soft Zinc Low-Strain Vibe) */
        html.dark body {
            background-color: #18181b;
            background-image: radial-gradient(circle at 50% 50%, #27272a 0%, #141417 80%);
            color: #e4e4e7;
        }

        /* Interactive Canvas Container */
        #network-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        /* Floating Glass Panel Styling */
        html:not(.dark) .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
        }

        html.dark .glass-panel {
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 5px; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #52525b; border-radius: 5px; }

        /* Vis.js tooltip styling override */
        html:not(.dark) div.vis-tooltip {
            background-color: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(8px);
            border: 1px solid #a1a1aa !important;
            color: #27272a !important;
            font-family: ui-sans-serif, system-ui, sans-serif !important;
            border-radius: 0.5rem !important;
            padding: 10px 14px !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
        }

        html.dark div.vis-tooltip {
            background-color: rgba(39, 39, 42, 0.98) !important;
            backdrop-filter: blur(8px);
            border: 1px solid #52525b !important;
            color: #f4f4f5 !important;
            font-family: ui-sans-serif, system-ui, sans-serif !important;
            border-radius: 0.5rem !important;
            padding: 10px 14px !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4) !important;
        }

        /* Active Route Table Row Highlights - Softer WCAG contrast */
        html:not(.dark) tr.active-route {
            background-color: #f0fdf4 !important; 
            color: #166534 !important; 
        }
        html:not(.dark) tr.active-route td { font-weight: 700; }
        
        html.dark tr.active-route {
            background-color: rgba(22, 101, 52, 0.3) !important; 
            color: #86efac !important; 
        }
        html.dark tr.active-route td { font-weight: 700; }
    </style>
</head>
<body class="text-zinc-800 dark:text-zinc-200">

    <!-- The Interactive Canvas Container -->
    <div id="network-container"></div>
    
    <!-- Floating HTML Overlay for Animated GIF Car -->
    <img id="animated-car-overlay" src="media/Travelling.gif" alt="Travel Car" class="hidden absolute z-10 pointer-events-none drop-shadow-2xl" style="width: 48px; height: 48px; transform: translate(-50%, -50%);" />

    <!-- Theme Toggle Button (Top Right) -->
    <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-20">
        <button onclick="toggleTheme()" class="glass-panel p-2.5 sm:p-3 rounded-full flex items-center justify-center text-zinc-600 dark:text-zinc-300 hover:text-emerald-600 dark:hover:text-emerald-400 transition-all hover:scale-105 active:scale-95" title="Toggle Light/Dark Theme">
            <!-- Moon Icon (Visible in Light Mode) -->
            <svg id="themeIconDark" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <!-- Sun Icon (Visible in Dark Mode) -->
            <svg id="themeIconLight" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
    </div>

    <!-- Floating Right Data Table Panel -->
    <div class="hidden lg:flex absolute top-24 right-6 w-[380px] max-h-[calc(100vh-160px)] glass-panel rounded-2xl p-5 z-10 flex-col gap-3">
        <div>
            <h2 class="text-zinc-800 dark:text-zinc-100 font-bold text-lg tracking-wide mb-1">Route Directory</h2>
            <p class="text-xs text-zinc-500 dark:text-zinc-400">Live Network Edge Data</p>
        </div>
        <div class="overflow-y-auto custom-scrollbar flex-1 rounded-lg border border-zinc-200 dark:border-zinc-700/60 bg-white/60 dark:bg-zinc-900/60">
            <table class="w-full text-left border-collapse text-xs">
                <thead class="bg-zinc-100 dark:bg-zinc-800/90 sticky top-0 z-10 text-zinc-600 dark:text-zinc-300 shadow-sm">
                    <tr>
                        <th class="p-2.5 font-bold border-b border-zinc-200 dark:border-zinc-700">From</th>
                        <th class="p-2.5 font-bold border-b border-zinc-200 dark:border-zinc-700">To</th>
                        <th class="p-2.5 font-bold border-b border-zinc-200 dark:border-zinc-700 text-center" title="Distance (km)">D</th>
                        <th class="p-2.5 font-bold border-b border-zinc-200 dark:border-zinc-700 text-center" title="Time (mins)">T</th>
                        <th class="p-2.5 font-bold border-b border-zinc-200 dark:border-zinc-700 text-center" title="Fuel (Liters)">F</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody" class="divide-y divide-zinc-200 dark:divide-zinc-700/50">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Floating Control Panel (Bottom on Mobile, Top-Left on Desktop) -->
    <div class="absolute bottom-4 left-4 right-4 sm:bottom-auto sm:top-6 sm:left-6 sm:right-auto sm:w-[340px] glass-panel rounded-2xl p-4 sm:p-5 z-10 flex flex-col gap-3 sm:gap-4 max-h-[50vh] sm:max-h-none overflow-y-auto custom-scrollbar">
        
        <div>
            <h2 class="text-zinc-800 dark:text-zinc-100 font-bold text-lg tracking-wide mb-1">Routing Map Controls</h2>
            <p class="text-xs text-zinc-500 dark:text-zinc-400">Cavite Geographic Architecture</p>
        </div>

        <!-- Start Node -->
        <div>
            <label class="block text-[10px] font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase mb-1.5">Start Node</label>
            <select id="startNode" class="w-full bg-white/90 dark:bg-zinc-800/90 border border-zinc-300 dark:border-zinc-600 text-zinc-800 dark:text-zinc-200 text-sm rounded-lg px-3 py-2 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-sm"></select>
        </div>

        <!-- End Node -->
        <div>
            <label class="block text-[10px] font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase mb-1.5">Destination Node</label>
            <select id="endNode" class="w-full bg-white/90 dark:bg-zinc-800/90 border border-zinc-300 dark:border-zinc-600 text-zinc-800 dark:text-zinc-200 text-sm rounded-lg px-3 py-2 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-sm"></select>
        </div>

        <!-- Optimization Criteria -->
        <div>
            <label class="block text-[10px] font-bold text-zinc-500 dark:text-zinc-400 tracking-wider uppercase mb-1.5">Optimize For</label>
            <select id="criteria" class="w-full bg-white/90 dark:bg-zinc-800/90 border border-zinc-300 dark:border-zinc-600 text-zinc-800 dark:text-zinc-200 text-sm rounded-lg px-3 py-2 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-sm">
                <option value="distance">Shortest Distance (km)</option>
                <option value="time">Fastest Time (mins)</option>
                <option value="fuel">Lowest Fuel (Liters)</option>
            </select>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2 mt-1 sm:mt-2">
            <button onclick="calculatePath()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 dark:bg-emerald-600 dark:hover:bg-emerald-500 text-white text-sm font-bold py-2.5 rounded-lg transition-all shadow active:scale-95">
                Calculate Route
            </button>
            <button onclick="resetGraph()" class="px-3 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 hover:bg-zinc-50 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-300 text-sm font-semibold rounded-lg transition-colors shadow-sm" title="Reset Colors">
                Reset
            </button>
        </div>

        <!-- Results Output Area -->
        <div id="resultBox" class="mt-1 bg-white/60 dark:bg-zinc-900/50 rounded-xl p-3 sm:p-4 border border-zinc-200 dark:border-zinc-700/60 min-h-[100px] sm:min-h-[120px] max-h-[140px] sm:max-h-[180px] overflow-y-auto custom-scrollbar shadow-inner">
            <p class="text-xs text-zinc-500 dark:text-zinc-400 text-center mt-3 sm:mt-5">Select locations and click calculate to discover the optimal route.</p>
        </div>

    </div>

    <!-- Floating Bottom Stats Bar (Hidden on Mobile to save space) -->
    <div class="hidden sm:flex absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel rounded-full px-6 py-3 z-10 gap-6 items-center text-xs text-zinc-600 dark:text-zinc-400 shadow-lg border border-zinc-200 dark:border-zinc-700">
        <div>Total Nodes: <span class="font-bold text-zinc-900 dark:text-zinc-200 ml-1" id="statNodes">0</span></div>
        <div class="w-1.5 h-1.5 rounded-full bg-zinc-300 dark:bg-zinc-600"></div>
        <div>Connections: <span class="font-bold text-zinc-900 dark:text-zinc-200 ml-1" id="statEdges">0</span></div>
        <div class="w-1.5 h-1.5 rounded-full bg-zinc-300 dark:bg-zinc-600"></div>
        <div>Region: <span class="font-bold text-emerald-600 dark:text-emerald-500 ml-1">Cavite Map Active</span></div>
    </div>

    <script>
        // ==========================================
        // THEME CONTROLLER (Light/Dark Toggle)
        // ==========================================
        let isDarkMode = false;

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateGraphTheme();
        }

        // ==========================================
        // PART 1: EXACT GPS/PIXEL MAP DATA SETUP
        // ==========================================
        const rawData = [
            { from: "IMUS", to: "BACOOR", d: 10, t: 15, f: 1.2 },
            { from: "BACOOR", to: "DASMA", d: 12, t: 25, f: 1.5 },
            { from: "DASMA", to: "KAWIT", d: 12, t: 25, f: 1.5 },
            { from: "KAWIT", to: "INDANG", d: 12, t: 25, f: 1.2 },
            { from: "INDANG", to: "SILANG", d: 14, t: 25, f: 1.5 },
            { from: "SILANG", to: "GENTRI", d: 10, t: 25, f: 1.3 },
            { from: "GENTRI", to: "NOVELETA", d: 10, t: 25, f: 1.5 },
            { from: "NOVELETA", to: "IMUS", d: 10, t: 15, f: 1.2 },
            { from: "BACOOR", to: "SILANG", d: 10, t: 25, f: 1.3 },
            { from: "DASMA", to: "SILANG", d: 12, t: 25, f: 1.5 },
            { from: "SILANG", to: "BACOOR", d: 10, t: 25, f: 1.3 },
            { from: "NOVELETA", to: "BACOOR", d: 10, t: 15, f: 1.2 },
            { from: "SILANG", to: "KAWIT", d: 14, t: 25, f: 1.2 },
            { from: "IMUS", to: "NOVELETA", d: 10, t: 15, f: 1.2 }
        ];

        // Ensure nodes sit exactly on the uploaded Cavite.png coordinates
        const cavitePositions = {
            "NOVELETA": { x: 534, y: 210 },
            "KAWIT":    { x: 604, y: 169 },
            "BACOOR":   { x: 731, y: 258 },
            "IMUS":     { x: 617, y: 290 },
            "DASMA":    { x: 697, y: 465 },
            "GENTRI":   { x: 582, y: 493 }, // General Trias
            "INDANG":   { x: 509, y: 714 },
            "SILANG":   { x: 780, y: 604 }
        };

        // Extract unique nodes dynamically
        const nodeSet = new Set();
        rawData.forEach(route => {
            nodeSet.add(route.from);
            nodeSet.add(route.to);
        });
        const nodesList = Array.from(nodeSet);

        // Build Adjacency List for Dijkstra
        const graph = {};
        nodesList.forEach(node => graph[node] = {});
        rawData.forEach(route => {
            graph[route.from][route.to] = { distance: route.d, time: route.t, fuel: route.f, id: `${route.from}-${route.to}` };
        });

        // Update Bottom Stats
        document.getElementById('statNodes').innerText = nodesList.length;
        document.getElementById('statEdges').innerText = rawData.length;

        // Soothing, high-contrast accessible color palette (Tailwind 600/700 series)
        const colorPalette = ['#2563eb', '#db2777', '#059669', '#ea580c', '#7c3aed', '#0891b2', '#be123c', '#4f46e5'];

        // Prepare Image Assets
        const mapImage = new Image();
        mapImage.src = 'media/Cavite.png'; 
        
        // Global State for the Car Renderer (Guarantees top layer drawing)
        window.carState = { active: false, x: 0, y: 0, dx: 1 };

        // ==========================================
        // DATA TABLE INITIALIZATION
        // ==========================================
        function initTable() {
            const tbody = document.getElementById('dataTableBody');
            let html = '';
            rawData.forEach(route => {
                html += `<tr id="row-${route.from}-${route.to}" class="transition-colors duration-300 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/80">
                    <td class="p-2.5 font-medium">${route.from}</td>
                    <td class="p-2.5 font-medium">${route.to}</td>
                    <td class="p-2.5 text-center col-distance">${route.d}</td>
                    <td class="p-2.5 text-center col-time">${route.t}</td>
                    <td class="p-2.5 text-center col-fuel">${route.f}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ==========================================
        // PART 2: GRAPH VISUALIZATION (Vis.js)
        // ==========================================
        let network;
        let nodesDataset;
        let edgesDataset;

        function initGraph() {
            // Prepare Nodes with exact X/Y Coordinates mapping to your Cavite.png
            const visNodes = nodesList.map((node, index) => {
                const nodeColor = colorPalette[index % colorPalette.length];
                return {
                    id: node, 
                    label: `<b>${node}</b>`, 
                    x: cavitePositions[node].x,
                    y: cavitePositions[node].y,
                    shape: 'dot',
                    size: 16,
                    highlighted: false, 
                    // WCAG AAA Contrast Halo for Text Legibility
                    font: { 
                        size: 15, 
                        face: 'Tahoma', 
                        multi: 'html', 
                        vadjust: -75, // Pushes the label completely above the node circle
                        bold: { color: '#18181b', strokeWidth: 4, strokeColor: '#ffffff', face: 'Tahoma' } 
                    },
                    color: { background: nodeColor, border: '#ffffff' },
                    borderWidth: 2,
                    shadow: { enabled: true, color: 'rgba(0,0,0,0.15)', size: 8, x: 2, y: 2 } 
                };
            });

            // Prepare Edges
            const visEdges = rawData.map(route => {
                // Create a literal DOM Element for the tooltip to prevent raw HTML string rendering
                const tooltipBox = document.createElement('div');
                tooltipBox.className = 'flex flex-col gap-1.5 min-w-[130px]';
                tooltipBox.innerHTML = `
                    <div class="font-bold text-emerald-600 dark:text-emerald-400 border-b border-zinc-200 dark:border-zinc-700 pb-1.5 mb-1 text-sm flex justify-between items-center">
                        <span>${route.from}</span>
                        <span class="text-zinc-400 text-xs mx-2">➔</span>
                        <span>${route.to}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider text-[9px]">Distance</span>
                        <span class="font-bold text-zinc-800 dark:text-zinc-100 text-xs">${route.d} km</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider text-[9px]">Time</span>
                        <span class="font-bold text-zinc-800 dark:text-zinc-100 text-xs">${route.t} min</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider text-[9px]">Fuel</span>
                        <span class="font-bold text-zinc-800 dark:text-zinc-100 text-xs">${route.f} L</span>
                    </div>
                `;

                return {
                    id: `${route.from}-${route.to}`,
                    from: route.from,
                    to: route.to,
                    highlighted: false,
                    title: tooltipBox, // Pass the DOM Element instead of a string!
                    label: `D: ${route.d} km\nT: ${route.t} min\nF: ${route.f} L`,
                    // WCAG AAA Contrast Halo for Edges
                    font: { size: 13, align: 'top', color: '#18181b', strokeWidth: 4, strokeColor: '#ffffff', background: 'none', face: 'Tahoma' },
                    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                    color: { color: 'rgba(161, 161, 170, 0.8)', highlight: '#10b981' }, // Neutral grey lines so node colors pop
                    width: 2,
                    smooth: false // Removed curve to make edges perfectly straight matching the car's path
                };
            });

            nodesDataset = new vis.DataSet(visNodes);
            edgesDataset = new vis.DataSet(visEdges);

            const container = document.getElementById('network-container');
            const data = { nodes: nodesDataset, edges: edgesDataset };
            const options = {
                physics: { enabled: false },
                interaction: { hover: true, tooltipDelay: 50, dragNodes: false }
            };

            network = new vis.Network(container, data, options);

            // ==========================================
            // DRAW CAVITE MAP - BACKGROUND LAYER
            // ==========================================
            network.on("beforeDrawing", function(ctx) {
                if (mapImage.complete && mapImage.naturalWidth !== 0) {
                    ctx.save();
                    if (isDarkMode) {
                        ctx.filter = 'invert(0.92) hue-rotate(180deg) brightness(0.7) sepia(0.15) opacity(0.4)';
                        ctx.globalAlpha = 1.0; 
                    } else {
                        ctx.filter = 'sepia(0.1) opacity(0.6)';
                        ctx.globalAlpha = 1.0; 
                    }
                    ctx.drawImage(mapImage, 0, 0);
                    ctx.restore();
                }
            });

            // ==========================================
            // SYNC ANIMATED GIF CAR OVERLAY
            // ==========================================
            network.on("afterDrawing", function(ctx) {
                const carOverlay = document.getElementById('animated-car-overlay');
                if (window.carState && window.carState.active) {
                    // Convert canvas map coordinates to actual screen pixels
                    const domPos = network.canvasToDOM({x: window.carState.x, y: window.carState.y});
                    carOverlay.style.left = domPos.x + 'px';
                    carOverlay.style.top = domPos.y + 'px';
                    
                    // Dynamically scale the car overlay to exactly match the network node size!
                    // Change the multiplier below (48) to scale the car proportionally
                    const currentScale = network.getScale();
                    const scaledSize = 48 * currentScale; 
                    carOverlay.style.width = scaledSize + 'px';
                    carOverlay.style.height = scaledSize + 'px';
                    
                    // Update image direction
                    const expectedSrc = window.carState.dx > 0 ? 'media/Travelling_right.gif' : 'media/Travelling.gif';
                    if (!carOverlay.src.includes(expectedSrc)) {
                        carOverlay.src = expectedSrc;
                    }
                    
                    if (carOverlay.classList.contains('hidden')) {
                        carOverlay.classList.remove('hidden');
                    }
                } else {
                    if (!carOverlay.classList.contains('hidden')) {
                        carOverlay.classList.add('hidden');
                    }
                }
            });

            mapImage.onload = function() {
                if (network) network.redraw();
            };

            // Backend telemetry initialization
            const _traceId = Math.random().toString(36).substring(2, 10);
            setTimeout(() => { if(window.console) console.info(`%c[Network] initialized with trace id: ${_traceId}`, 'color: #71717a; font-size: 11px;'); }, 50);

            // Populate Dropdowns
            const startSelect = document.getElementById('startNode');
            const endSelect = document.getElementById('endNode');
            nodesList.forEach(node => {
                startSelect.add(new Option(node, node));
                endSelect.add(new Option(node, node));
            });
            endSelect.selectedIndex = 1; 

            // Smoothly frame your map on load
            setTimeout(() => {
                network.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
            }, 100);
        }

        // Dynamically recalculate Vis.js properties depending on Light/Dark Mode
        function updateGraphTheme() {
            if (!network) return;
            
            // WCAG AAA Halos: Black text + White Halo (Light) OR White text + Black Halo (Dark)
            const nodeFontColor = isDarkMode ? '#faf9f6' : '#18181b';
            const nodeStrokeColor = isDarkMode ? '#000000' : '#ffffff';
            
            const edgeFontColor = isDarkMode ? '#faf9f6' : '#18181b';
            const edgeStrokeColor = isDarkMode ? '#000000' : '#ffffff';
            const edgeLineColor = isDarkMode ? 'rgba(82, 82, 91, 0.7)' : 'rgba(161, 161, 170, 0.8)';
            const highlightColor = isDarkMode ? '#10b981' : '#059669'; // Emerald
            
            const shadowBaseColor = isDarkMode ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.15)';
            
            const updatedNodes = nodesDataset.get().map(node => {
                const isHighlight = node.highlighted;
                return {
                    id: node.id,
                    font: { 
                        vadjust: -75, // Maintain label position well above the node
                        bold: { color: nodeFontColor, strokeColor: nodeStrokeColor, strokeWidth: 4, face: 'Tahoma' }
                    },
                    shadow: { 
                        color: isHighlight ? (isDarkMode ? highlightColor : 'rgba(5, 150, 105, 0.5)') : shadowBaseColor,
                        size: isHighlight ? (isDarkMode ? 25 : 15) : 8
                    }
                };
            });
            
            const updatedEdges = edgesDataset.get().map(edge => {
                const isHighlight = edge.highlighted;
                return {
                    id: edge.id,
                    font: { color: edgeFontColor, strokeColor: edgeStrokeColor, strokeWidth: 4, face: 'Tahoma', background: 'none' },
                    color: { color: isHighlight ? highlightColor : edgeLineColor },
                    shadow: { 
                        color: isHighlight ? (isDarkMode ? highlightColor : 'rgba(5, 150, 105, 0.5)') : false,
                        size: isHighlight ? 8 : 0
                    }
                };
            });
            
            nodesDataset.update(updatedNodes);
            edgesDataset.update(updatedEdges);
            network.redraw(); // Force map background filter to apply
        }

        function resetGraph() {
            // Clean up car animation if it's currently running
            if (window.carAnimationId) {
                cancelAnimationFrame(window.carAnimationId);
                window.carAnimationId = null;
            }
            window.carState.active = false;
            // Force redraw immediately so the GIF overlay hides
            if (network) network.redraw();

            nodesDataset.get().forEach((node, index) => {
                const nodeColor = colorPalette[index % colorPalette.length];
                nodesDataset.update({ 
                    id: node.id, 
                    highlighted: false,
                    color: { background: nodeColor, border: '#ffffff' },
                    shadow: { enabled: true, color: isDarkMode ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.15)', size: 8, x: 2, y: 2 },
                    borderWidth: 2,
                    size: 16
                });
            });

            edgesDataset.get().forEach(edge => {
                edgesDataset.update({ 
                    id: edge.id, 
                    highlighted: false,
                    color: { color: isDarkMode ? 'rgba(82, 82, 91, 0.7)' : 'rgba(161, 161, 170, 0.8)' }, 
                    width: 2,
                    shadow: { enabled: false }
                });
            });

            // Reset Data Table Highlights
            rawData.forEach(route => {
                const row = document.getElementById(`row-${route.from}-${route.to}`);
                if (row) row.classList.remove('active-route');
            });
            document.querySelectorAll('.col-distance, .col-time, .col-fuel').forEach(el => {
                el.classList.remove('text-emerald-600', 'dark:text-emerald-400', 'font-bold');
            });
            
            document.getElementById('resultBox').innerHTML = `<p class="text-xs text-zinc-500 dark:text-zinc-400 text-center mt-5">Select locations and click calculate to discover the optimal route.</p>`;
            
            network.redraw();
        }

        // ==========================================
        // PART 3: DIJKSTRA'S ALGORITHM
        // ==========================================
        function findShortestPath(start, end, criteria) {
            const distances = {};
            const previous = {};
            const unvisited = new Set(nodesList);

            nodesList.forEach(node => { distances[node] = Infinity; previous[node] = null; });
            distances[start] = 0;

            while (unvisited.size > 0) {
                let currentNode = null;
                let minDistance = Infinity;
                
                unvisited.forEach(node => {
                    if (distances[node] < minDistance) { minDistance = distances[node]; currentNode = node; }
                });

                if (currentNode === null || currentNode === end) break;
                unvisited.delete(currentNode);

                for (let neighbor in graph[currentNode]) {
                    if (unvisited.has(neighbor)) {
                        let edgeCost = graph[currentNode][neighbor][criteria];
                        let newDistance = distances[currentNode] + edgeCost;
                        if (newDistance < distances[neighbor]) {
                            distances[neighbor] = newDistance;
                            previous[neighbor] = currentNode;
                        }
                    }
                }
            }

            const path = [];
            let current = end;
            while (current !== null) {
                path.unshift(current);
                current = previous[current];
            }
            return (path.length > 0 && path[0] === start) ? path : null;
        }

        // ==========================================
        // PART 4: MAIN EXECUTION & ANIMATION
        // ==========================================
        window.carAnimationId = null;

        function animateCar(path, criteria) {
            if (path.length < 2) return;

            const positions = network.getPositions();
            
            // Set initial state
            window.carState.active = true;
            window.carState.x = positions[path[0]].x;
            window.carState.y = positions[path[0]].y;
            window.carState.dx = positions[path[1]].x - positions[path[0]].x;
            network.redraw();

            let currentSegment = 0;
            let progress = 0;
            
            // Base speed multipliers depending on the criteria scale
            let speedMultiplier = 0.2; 
            if (criteria === 'time') speedMultiplier = 0.3;
            else if (criteria === 'fuel') speedMultiplier = 0.02;

            function step() {
                if (currentSegment >= path.length - 1) return; // Reached destination

                const startNode = path[currentSegment];
                const endNode = path[currentSegment + 1];
                const startPos = positions[startNode];
                const endPos = positions[endNode];

                // Fetch the actual value of this specific route segment from the graph
                const edgeWeight = graph[startNode][endNode][criteria];
                
                // Dynamic speed calculation: Higher value = Slower animation
                const currentSpeed = speedMultiplier / edgeWeight;
                progress += currentSpeed;
                
                if (progress >= 1) {
                    progress = 0;
                    currentSegment++;
                    
                    if (currentSegment >= path.length - 1) {
                        // Snap exactly to final destination
                        window.carState.x = positions[path[path.length-1]].x;
                        window.carState.y = positions[path[path.length-1]].y;
                        network.redraw();
                        return;
                    }
                    
                    // The car is starting a new segment, calculate new direction
                    const nextStartNode = path[currentSegment];
                    const nextEndNode = path[currentSegment + 1];
                    window.carState.dx = positions[nextEndNode].x - positions[nextStartNode].x;
                    
                } else {
                    // Interpolate coordinates for smooth movement
                    window.carState.x = startPos.x + (endPos.x - startPos.x) * progress;
                    window.carState.y = startPos.y + (endPos.y - startPos.y) * progress;
                }
                
                // Trigger the afterDrawing hook to move the DOM element
                network.redraw();
                window.carAnimationId = requestAnimationFrame(step);
            }
            
            step();
        }

        function calculatePath() {
            resetGraph(); 

            const startNode = document.getElementById('startNode').value;
            const endNode = document.getElementById('endNode').value;
            const criteria = document.getElementById('criteria').value;
            const resultBox = document.getElementById('resultBox');

            if (startNode === endNode) {
                resultBox.innerHTML = `<p class="text-[11px] text-rose-600 dark:text-rose-400 font-semibold p-3 bg-white dark:bg-zinc-800 rounded-lg border border-rose-200 dark:border-rose-900/50">Start and End nodes cannot be the same.</p>`;
                return;
            }

            const path = findShortestPath(startNode, endNode, criteria);

            if (path) {
                let totalD = 0, totalT = 0, totalF = 0;
                let edgesInPath = [];

                for (let i = 0; i < path.length - 1; i++) {
                    let u = path[i];
                    let v = path[i+1];
                    totalD += graph[u][v].distance;
                    totalT += graph[u][v].time;
                    totalF += graph[u][v].fuel;
                    edgesInPath.push(`${u}-${v}`);
                }

                const criteriaName = document.getElementById('criteria').options[document.getElementById('criteria').selectedIndex].text;
                
                let pathHtml = `
                    <div class="mb-3">
                        <span class="inline-block bg-emerald-100 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300 border border-emerald-200 dark:border-emerald-700/50 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest mb-2">Optimized for: ${criteriaName}</span>
                        <div class="text-[13px] font-mono text-zinc-800 dark:text-white bg-white dark:bg-zinc-800 p-2.5 rounded border border-zinc-200 dark:border-zinc-700 break-words leading-relaxed shadow-sm dark:shadow-inner">
                            ${path.join(' <span class="text-emerald-500 font-sans mx-0.5">➔</span> ')}
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="bg-white dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/60 rounded p-2 shadow-sm">
                            <div class="text-[9px] text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider mb-0.5">Distance</div>
                            <div class="font-bold text-zinc-800 dark:text-zinc-200 text-sm">${totalD} <span class="text-[10px] text-zinc-400 dark:text-zinc-500">km</span></div>
                        </div>
                        <div class="bg-white dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/60 rounded p-2 shadow-sm">
                            <div class="text-[9px] text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider mb-0.5">Time</div>
                            <div class="font-bold text-zinc-800 dark:text-zinc-200 text-sm">${totalT} <span class="text-[10px] text-zinc-400 dark:text-zinc-500">m</span></div>
                        </div>
                        <div class="bg-white dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/60 rounded p-2 shadow-sm">
                            <div class="text-[9px] text-zinc-500 dark:text-zinc-400 font-bold uppercase tracking-wider mb-0.5">Fuel</div>
                            <div class="font-bold text-zinc-800 dark:text-zinc-200 text-sm">${totalF.toFixed(2)} <span class="text-[10px] text-zinc-400 dark:text-zinc-500">L</span></div>
                        </div>
                    </div>
                `;
                resultBox.innerHTML = pathHtml;

                // Highlight Table Active Metric Column
                const criteriaClass = criteria === 'distance' ? 'col-distance' : (criteria === 'time' ? 'col-time' : 'col-fuel');
                document.querySelectorAll(`.${criteriaClass}`).forEach(el => {
                    el.classList.add('text-emerald-600', 'dark:text-emerald-400', 'font-bold');
                });

                // Highlight Table Rows
                edgesInPath.forEach(edgeId => {
                    const row = document.getElementById(`row-${edgeId}`);
                    if (row) {
                        row.classList.add('active-route');
                        row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });

                // Animated Path Highlighting on Canvas
                let animationDelay = 0;
                const stepDelay = 300;
                const highlightColor = isDarkMode ? '#10b981' : '#059669';

                path.forEach((nodeId, index) => {
                    setTimeout(() => {
                        nodesDataset.update({ 
                            id: nodeId, 
                            highlighted: true,
                            color: { background: isDarkMode ? '#18181b' : '#ffffff', border: highlightColor }, 
                            shadow: { enabled: true, color: isDarkMode ? highlightColor : 'rgba(5, 150, 105, 0.5)', size: isDarkMode ? 25 : 15, x: 0, y: 0 }, 
                            borderWidth: 4,
                            size: 20 
                        });
                    }, animationDelay);

                    if (index < path.length - 1) {
                        const edgeId = `${nodeId}-${path[index+1]}`;
                        setTimeout(() => {
                            edgesDataset.update({
                                id: edgeId,
                                highlighted: true,
                                color: { color: highlightColor }, 
                                width: 4,
                                shadow: { enabled: true, color: isDarkMode ? highlightColor : 'rgba(5, 150, 105, 0.5)', size: 8, x:0, y:0 }
                            });
                        }, animationDelay + (stepDelay / 2));
                    }
                    animationDelay += stepDelay;
                });

                // Launch the car animation immediately after the path visualization finishes
                setTimeout(() => {
                    animateCar(path, criteria); 
                }, animationDelay);

            } else {
                resultBox.innerHTML = `<p class="text-[11px] text-rose-600 dark:text-rose-400 font-semibold p-3 bg-white dark:bg-zinc-800 rounded-lg border border-rose-200 dark:border-rose-900/50">No valid path found in the network.</p>`;
            }
        }

        window.onload = () => {
            initGraph();
            initTable();
        };

    </script>
</body>
